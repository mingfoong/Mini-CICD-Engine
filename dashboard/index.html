<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini PaaS Dashboard</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: #f4f3ef;
    color: #2c2c2a;
    margin: 0;
    padding: 2rem;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
  }
  h1 {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 1.5rem;
  }
  .deploy-box {
    display: flex;
    gap: 8px;
    margin-bottom: 2rem;
  }
  input[type="text"] {
    flex: 1;
    padding: 10px 12px;
    border: 0.5px solid #b4b2a9;
    border-radius: 8px;
    font-size: 14px;
  }
  button {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    background: #534ab7;
    color: white;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  button:hover { background: #3c3489; }
  button:disabled { background: #b4b2a9; cursor: not-allowed; }

  .job-card {
    background: white;
    border: 0.5px solid #d3d1c7;
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 12px;
  }
  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .job-id {
    font-family: monospace;
    font-size: 13px;
    color: #5f5e5a;
  }
  .status-badge {
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 6px;
  }
  .status-queued, .status-cloning, .status-building, .status-deploying {
    background: #faeeda;
    color: #854f0b;
  }
  .status-running {
    background: #eaf3de;
    color: #3b6d11;
  }
  .status-failed {
    background: #fcebeb;
    color: #a32d2d;
  }
  .repo-url {
    font-size: 13px;
    color: #5f5e5a;
    word-break: break-all;
    margin-bottom: 8px;
  }
  .deploy-url a {
    font-size: 14px;
    color: #185fa5;
    text-decoration: none;
  }
  .logs-toggle {
    font-size: 12px;
    color: #5f5e5a;
    cursor: pointer;
    margin-top: 8px;
    display: inline-block;
  }
  .logs-box {
    background: #2c2c2a;
    color: #d3d1c7;
    font-family: monospace;
    font-size: 12px;
    padding: 12px;
    border-radius: 8px;
    margin-top: 8px;
    max-height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
    display: none;
  }
  .logs-box.open { display: block; }
  .empty-state {
    color: #888780;
    font-size: 14px;
    text-align: center;
    padding: 2rem 0;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Mini PaaS Dashboard</h1>

  <div class="deploy-box">
    <input type="text" id="repoUrlInput" placeholder="https://github.com/user/repo.git" />
    <button id="deployBtn" onclick="deployRepo()">Deploy</button>
  </div>

  <div id="jobsList">
    <div class="empty-state">No deployments yet.</div>
  </div>
</div>

<script>
const API_BASE = "";

async function deployRepo() {
  const input = document.getElementById("repoUrlInput");
  const btn = document.getElementById("deployBtn");
  const repoUrl = input.value.trim();

  if (!repoUrl) {
    alert("Please enter a GitHub repo URL.");
    return;
  }

  btn.disabled = true;
  btn.textContent = "Deploying...";

  try {
    const res = await fetch(`${API_BASE}/deploy`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ repo_url: repoUrl })
    });

    if (!res.ok) throw new Error("Deploy request failed");

    input.value = "";
    await loadJobs();
  } catch (err) {
    alert("Error: " + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "Deploy";
  }
}

async function loadJobs() {
  try {
    const res = await fetch(`${API_BASE}/deployments`);
    const jobs = await res.json();
    renderJobs(jobs.reverse());
  } catch (err) {
    console.error("Failed to load jobs:", err);
  }
}

function renderJobs(jobs) {
  const container = document.getElementById("jobsList");

  if (jobs.length === 0) {
    container.innerHTML = '<div class="empty-state">No deployments yet.</div>';
    return;
  }

  container.innerHTML = jobs.map(job => `
    <div class="job-card">
      <div class="job-header">
        <span class="job-id">${job.id}</span>
        <span class="status-badge status-${job.status}">${job.status}</span>
      </div>
      <div class="repo-url">${job.repo_url}</div>
      ${job.url ? `<div class="deploy-url"><a href="${job.url}" target="_blank">${job.url}</a></div>` : ""}
      <span class="logs-toggle" onclick="toggleLogs('${job.id}', this)">Show logs</span>
      <div class="logs-box" id="logs-${job.id}"></div>
    </div>
  `).join("");
}

async function toggleLogs(jobId, el) {
  const box = document.getElementById(`logs-${jobId}`);
  const isOpen = box.classList.contains("open");

  if (isOpen) {
    box.classList.remove("open");
    el.textContent = "Show logs";
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/logs/${jobId}`);
    const data = await res.json();
    box.textContent = data.logs.join("\n") || "No logs yet.";
    box.classList.add("open");
    el.textContent = "Hide logs";
  } catch (err) {
    box.textContent = "Failed to load logs.";
    box.classList.add("open");
  }
}

loadJobs();
setInterval(loadJobs, 3000);
</script>
</body>
</html>
